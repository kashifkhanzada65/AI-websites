<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
    }

    .container {
        text-align: center;
        background: rgba(255,255,255,0.08);
        padding: 30px;
        border-radius: 20px;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
        margin-bottom: 20px;
    }

    #time {
        font-size: 42px;
        margin-bottom: 20px;
        letter-spacing: 2px;
        font-weight: bold;
    }

    .buttons button {
        padding: 10px 14px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;
        transition: 0.3s;
    }

    .start { background: #28a745; color: white; }
    .pause { background: #ffc107; color: black; }
    .reset { background: #dc3545; color: white; }
    .lap   { background: #17a2b8; color: white; }

    .buttons button:hover {
        transform: scale(1.05);
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
        max-height: 160px;
        overflow-y: auto;
    }

    li {
        background: rgba(255,255,255,0.15);
        margin: 5px 0;
        padding: 8px;
        border-radius: 8px;
    }

    @media (max-width: 480px) {
        #time {
            font-size: 30px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>⏱ Stopwatch MS</h1>

    <div id="time">00:00:00:000</div>

    <div class="buttons">
        <button class="start" onclick="start()">Start</button>
        <button class="pause" onclick="pause()">Pause</button>
        <button class="reset" onclick="reset()">Reset</button>
        <button class="lap" onclick="lap()">Lap</button>
    </div>

    <ul id="laps"></ul>
</div>

<script>
let timer;
let startTime;
let elapsed = 0;
let running = false;

function formatTime(ms) {
    let hours = Math.floor(ms / 3600000);
    let minutes = Math.floor((ms % 3600000) / 60000);
    let seconds = Math.floor((ms % 60000) / 1000);
    let milliseconds = ms % 1000;

    return (
        String(hours).padStart(2,'0') + ":" +
        String(minutes).padStart(2,'0') + ":" +
        String(seconds).padStart(2,'0') + ":" +
        String(milliseconds).padStart(3,'0')
    );
}

function update() {
    let now = Date.now();
    elapsed = now - startTime;
    document.getElementById("time").textContent = formatTime(elapsed);
}

function start() {
    if (!running) {
        running = true;
        startTime = Date.now() - elapsed;
        timer = setInterval(update, 50);
    }
}

function pause() {
    clearInterval(timer);
    running = false;
}

function reset() {
    pause();
    elapsed = 0;
    document.getElementById("time").textContent = "00:00:00:000";
    document.getElementById("laps").innerHTML = "";
}

function lap() {
    if (running) {
        let li = document.createElement("li");
        li.textContent = document.getElementById("time").textContent;
        document.getElementById("laps").appendChild(li);
    }
}
</script>

</body>
</html>
